version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mrmed_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mrmed_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: mrmed_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: mrmed_backend
    restart: always
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=mrmed_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyforauth
      - JWT_REFRESH_SECRET=supersecretrefreshjwtkeyforauth
      - JWT_EXPIRE=1h
      - JWT_REFRESH_EXPIRE=7d
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build: ./frontend
    container_name: mrmed_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mrmed_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
